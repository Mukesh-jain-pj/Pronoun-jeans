{% load humanize %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
</head>
<body style="margin:0;padding:0;background-color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#f0f0f0;">
    <tr>
      <td align="center" style="padding:40px 16px;">

        <table width="600" cellpadding="0" cellspacing="0" role="presentation" style="max-width:600px;width:100%;background:#ffffff;border-radius:6px;border:1px solid #d8d8d8;">

          <!-- Header -->
          <tr>
            <td style="background-color:#111111;padding:28px 36px;border-radius:6px 6px 0 0;">
              <p style="margin:0;font-size:20px;font-weight:800;color:#ffffff;letter-spacing:3px;text-transform:uppercase;line-height:1;">PRONOUN JEANS</p>
              <p style="margin:5px 0 0;font-size:10px;font-weight:500;color:#777777;letter-spacing:2px;text-transform:uppercase;">B2B Wholesale Portal</p>
            </td>
          </tr>

          <!-- Content -->
          <tr>
            <td style="padding:40px 36px;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#f9f9f9;border-top:1px solid #eeeeee;padding:22px 36px;border-radius:0 0 6px 6px;">
              <p style="margin:0;font-size:12px;color:#aaaaaa;text-align:center;line-height:1.7;">
                Pronoun Jeans B2B &bull; <a href="mailto:pronounjeans@gmail.com" style="color:#aaaaaa;text-decoration:none;">pronounjeans@gmail.com</a><br>
                Questions? Reply to this email and we'll get back to you.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
