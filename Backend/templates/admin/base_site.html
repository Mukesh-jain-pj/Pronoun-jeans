{% extends "admin/base.html" %}
{% load static %}

{% block extrahead %}
{{ block.super }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'admin/css/admin_custom.css' %}">
<style>
:root, [data-theme="dark"], [data-theme="light"] {
  --primary: #dc2626 !important;
  --secondary: #b91c1c !important;
  --primary-fg: #fff !important;
  --body-fg: #1a1f36 !important;
  --body-bg: #f4f6f9 !important;
  --body-loud-color: #1a1f36 !important;
  --body-quiet-color: #6b7280 !important;
  --header-color: #fff !important;

  --header-bg: #dc2626 !important;

  --breadcrumbs-link-fg: #4b5563 !important;
  --breadcrumbs-bg: #ffffff !important;
  --link-fg: #dc2626 !important;
  --link-hover-color: #b91c1c !important;
  --link-selected-fg: #dc2626 !important;

  --border-color: #e5e7eb !important;
  --darkened-bg: #f8fafc !important;
  --selected-bg: #fef2f2 !important;

  --button-fg: #fff !important;
  --button-bg: #dc2626 !important;
  --button-hover-bg: #b91c1c !important;
  --default-button-fg: #fff !important;
  --default-button-bg: #dc2626 !important;
  --default-button-hover-bg: #b91c1c !important;
  --sidebar-bg: #ffffff !important;
  --font-family-primary: 'Inter', system-ui, sans-serif !important;

button.theme-toggle { display: none !important; }

{% block branding %}
<h1 id="site-name"><a href="{% url 'admin:index' %}">Pronoun Jeans Admin</a></h1>
